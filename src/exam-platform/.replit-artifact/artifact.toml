kind = "web"
previewPath = "/"
title = "Manish Ki Pathshala"
version = "1.0.0"
id = "artifacts/exam-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22619

[services.development]
run = "pnpm --filter @workspace/exam-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exam-platform", "run", "build" ]
run = "pnpm --filter @workspace/exam-platform run start"

[services.env]
PORT = "22619"
